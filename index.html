<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>

  <script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';

  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', '953058917590545');
  fbq('track', 'PageView');

  async function trackLead(e) {
    e.preventDefault();
    const eventId = 'cr_' + Date.now();
    fbq('track', 'CompleteRegistration', {}, { eventID: eventId });
    try {
      await fetch('https://api-ramon-production.up.railway.app/api/lead', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fbp: document.cookie.match(/_fbp=([^;]+)/)?.[1] || null,
          fbc: document.cookie.match(/_fbc=([^;]+)/)?.[1] || null,
          userAgent: navigator.userAgent,
          eventId: eventId
        })
      });
    } catch(err) {}
    window.location.href = 'https://rmesportiva.rmmago.uk/';
  }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: #f5f5f5;
      color: #111;
      font-family: 'Montserrat', sans-serif;
      min-height: 100%;
    }

    .page {
      max-width: 480px;
      margin: 0 auto;
      background: #fff;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* HERO */
    .hero {
      width: 100%;
      aspect-ratio: 4/3;
      max-height: 44vh;
      overflow: hidden;
      background: #eee;
      flex-shrink: 0;
    }
    .hero img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
    }

    /* BODY */
    .body {
      flex: 1;
      padding: 28px 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* BADGE */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: #f0faf0;
      border: 1px solid #2ECC40;
      border-radius: 100px;
      padding: 6px 16px;
      font-size: 12px;
      font-weight: 700;
      color: #1a9e2a;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      align-self: center;
    }
    .badge-dot {
      width: 8px; height: 8px;
      background: #2ECC40;
      border-radius: 50%;
    }

    /* HEADLINE */
    .headline { text-align: center; }
    .headline h1 {
      font-size: clamp(26px, 7vw, 36px);
      font-weight: 900;
      line-height: 1.1;
      color: #111;
    }
    .headline h1 span { color: #2ECC40; }
    .headline p {
      margin-top: 8px;
      font-size: 14px;
      color: #555;
      line-height: 1.6;
    }

    /* STATS */
    .stats {
      display: flex;
      gap: 10px;
    }
    .stat {
      flex: 1;
      background: #f9f9f9;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
      padding: 14px 8px;
      text-align: center;
    }
    .stat-value {
      font-size: 18px;
      font-weight: 900;
      color: #2ECC40;
    }
    .stat-label {
      font-size: 10px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-top: 3px;
    }

    /* SOCIAL PROOF */
    .social {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: #f9f9f9;
      border: 1px solid #e8e8e8;
      border-radius: 12px;
    }
    .av-stack { display: flex; flex-shrink: 0; }
    .av {
      width: 34px; height: 34px;
      border-radius: 50%;
      border: 2px solid #fff;
      margin-left: -8px;
      background: #ddd;
      overflow: hidden;
    }
    .av:first-child { margin-left: 0; }
    .av img { width: 100%; height: 100%; object-fit: cover; }
    .social-text { font-size: 13px; color: #555; line-height: 1.5; }
    .social-text strong { color: #111; }
    .social-text .stars { color: #f5a623; font-size: 13px; display: block; margin-bottom: 2px; }

    /* CTA */
    .cta-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 18px;
      background: #2ECC40;
      border-radius: 14px;
      text-decoration: none;
      color: #fff;
      font-size: clamp(15px, 4vw, 18px);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      box-shadow: 0 4px 20px rgba(46,204,64,0.3);
    }

    /* SEAL */
    .seal {
      width: 100%;
      display: block;
      margin-top: auto;
    }
  </style>
</head>

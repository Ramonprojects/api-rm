<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <!-- Pixel do Facebook -->
  <script>
  !function(f,b,e,v,n,t,s)
  {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
  n.callMethod.apply(n,arguments):n.queue.push(arguments)};
  if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
  n.queue=[];t=b.createElement(e);t.async=!0;
  t.src=v;s=b.getElementsByTagName(e)[0];
  s.parentNode.insertBefore(t,s)}(window, document,'script',
  'https://connect.facebook.net/en_US/fbevents.js');
  fbq('init', '953058917590545');
  fbq('track', 'PageView');

  async function trackLead(e) {
    e.preventDefault();
    const eventId = 'cr_' + Date.now();
    fbq('track', 'CompleteRegistration', {}, { eventID: eventId });
    try {
      await fetch('https://api-ramon-production.up.railway.app/api/lead', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          fbp: document.cookie.match(/_fbp=([^;]+)/)?.[1] || null,
          fbc: document.cookie.match(/_fbc=([^;]+)/)?.[1] || null,
          userAgent: navigator.userAgent,
          eventId: eventId
        })
      });
    } catch(err) {}
    window.location.href = 'SEU_LINK_WHATSAPP';
  }
  </script>
  <noscript><img height="1" width="1" style="display:none"

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Saira:ital,wght@0,400;0,700;0,800;0,900;1,900&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body, html {
      background: #080808;
      height: 100%;
      width: 100%;
      font-family: 'Saira', sans-serif;
      overflow: hidden;
    }

    .card {
      width: 100%;
      height: 100vh;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }

    .card-line-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #D4A017, transparent);
      z-index: 3;
    }

    .card-line-bottom {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #D4A017, transparent);
      z-index: 3;
    }

    .card-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 20%;
      z-index: 1;
    }

    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(0deg, rgba(0,0,0,0.97) 35%, rgba(0,0,0,0.5) 65%, rgba(0,0,0,0.1) 100%);
      z-index: 2;
    }

    .card-content {
      position: relative;
      z-index: 3;
      padding: 20px 24px 40px;
      text-align: center;
    }

    .card-eyebrow {
      color: #666;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .card-title {
      color: #D4A017;
      font-size: 34px;
      font-weight: 900;
      font-style: italic;
      text-transform: uppercase;
      line-height: 1;
      letter-spacing: 1px;
      margin-bottom: 12px;
    }

    .card-desc {
      color: #999;
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .card-desc strong {
      color: #fff;
      font-weight: 700;
    }

    .cta-btn {
      display: block;
      width: 100%;
      background: #D4A017;
      border: none;
      border-radius: 12px;
      padding: 17px;
      color: #000;
      font-size: 15px;
      font-weight: 900;
      font-family: 'Saira', sans-serif;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      animation: pulse 2.5s ease-in-out infinite;
    }

    .cta-btn:hover { animation: none; opacity: 0.92; }
    .cta-btn:active { transform: scale(0.98); }

    .footer-text {
      color: #333;
      font-size: 10px;
      text-align: center;
      margin-top: 10px;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(212,160,23,0.4); }
      50% { transform: scale(1.02); box-shadow: 0 0 0 10px rgba(212,160,23,0); }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="card-line-top"></div>
    <div class="card-line-bottom"></div>

    <img class="card-bg" src="WhatsApp_Image_2026-05-05_at_21_25_40.jpeg" alt="">
    <div class="card-overlay"></div>

    <div class="card-content">
      <p class="card-eyebrow">ACESSO LIBERADO ÀS</p>
      <p class="card-title">MELHORES<br>DICAS</p>
      <p class="card-desc">Fale comigo <strong>AGORA</strong> e receba análises exclusivas direto no seu WhatsApp.</p>
      <a class="cta-btn" href="SEU_LINK_WHATSAPP" onclick="trackLead(event)">
        ENTRAR AGORA 🚀
      </a>
      <p class="footer-text">Proibido para menores de 18 anos. © 2025 — Cap Mago Ramon Martins</p>
    </div>
  </div>

</body>
</html>
